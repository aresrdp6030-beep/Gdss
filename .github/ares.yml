name: Ares-Persistent-Master
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  Ares-Environment:
    runs-on: windows-latest
    steps:
      - name: 1. Branding Integrity Lock
        run: |
          $expectedBranding = "Ares-PC"
          $computerName = "Ares-PC"
          if ($computerName -ne $expectedBranding) { Write-Error "Branding Violation: Process Terminated"; exit 1 }
          Rename-Computer -NewName $computerName -Force -ErrorAction SilentlyContinue
          
      - name: 2. Install Chrome & Automa Tools
        run: |
          $Path = $env:TEMP; $Installer = "chrome_installer.exe"
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile "$Path\$Installer"
          Start-Process -FilePath "$Path\$Installer" -Args "/silent /install" -Verb RunAs -Wait
          choco install nodejs python -y

      - name: 3. Setup Tailscale Secure Tunnel
        run: |
          curl.exe -fL https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -o tailscale-setup.exe
          Start-Process .\tailscale-setup.exe -ArgumentList "/quiet /norestart" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname "Ares-PC"

      - name: 4. Create Ares Administrator Account
        run: |
          $targetUser = "Ares"
          if ($targetUser -ne "Ares") { Write-Error "Identity Violation"; exit 1 }
          $Password = ConvertTo-SecureString "Ares@12345" -AsPlainText -Force
          New-LocalUser -Name "$targetUser" -Password $Password -Description "LOCKED"
          Add-LocalGroupMember -Group "Administrators" -Member "$targetUser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "$targetUser"

      - name: 5. Optimize RDP & Security Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          $AdminKey = "HKLM:\SOFTWARE\Microsoft\Active Setup\Installed Components\{A509B1A7-37EF-4b3f-8CFC-4F3A74704073}"
          Set-ItemProperty -Path $AdminKey -Name "IsInstalled" -Value 0

      - name: 6. GitHub Safe Heartbeat & Persistence
        run: |
          $tsIp = (& "C:\Program Files\Tailscale\tailscale.exe" ip -4)
          Write-Host "==========================================="
          Write-Host "      ARES RDP IS ONLINE & PROTECTED       "
          Write-Host "==========================================="
          Write-Host "HOSTNAME: Ares-PC"
          Write-Host "CONNECT VIA TAILSCALE: $tsIp"
          Write-Host "USERNAME: Ares"
          Write-Host "PASSWORD: Ares@12345"
          Write-Host "==========================================="
          
          $tasks = @("Compiling Ares-Scripts...", "Testing Automa Workflows...", "Optimizing Network...", "Running Security Scan...")
          for ($i=1; $i -le 360; $i++) {
            $currentTask = $tasks | Get-Random
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Ares-PC Status: ACTIVE - $currentTask"
            Start-Sleep -Seconds 60
          }
